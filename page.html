<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Image</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a1a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      align-items: center;
    }
    h1 {
      font-size: 24px;
      margin-right: auto;
    }
    button {
      padding: 10px 20px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #3a8eef;
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
      opacity: 0.6;
    }
    .cdn-link {
      padding: 10px 20px;
      background: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      display: inline-block;
      transition: background 0.2s;
    }
    .cdn-link:hover {
      background: #444;
    }
    .image-container {
      max-width: 90vw;
      max-height: 80vh;
    }
    img {
      max-width: 100%;
      max-height: 80vh;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      cursor: zoom-in;
      transition: transform 0.3s ease;
    }
    img:hover {
      transform: scale(1.1);
    }
    .fullscreen-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .fullscreen-overlay.active {
      display: flex;
    }
    .fullscreen-overlay img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      cursor: zoom-out;
    }
    .close-fullscreen {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: 2px solid #fff;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: background 0.2s;
    }
    .close-fullscreen:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    body.fullscreen-active .close-fullscreen {
      display: flex;
    }
    .error {
      color: #ff6b6b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Instagram Image</h1>
    <button id="downloadBtn">📥 Download</button>
    <a id="cdnLink" href="#" target="_blank" class="cdn-link">🔗 CDN Link</a>
  </div>
  
  <div class="image-container">
    <img id="image" alt="Instagram image">
  </div>
  
  <div id="fullscreenOverlay" class="fullscreen-overlay">
    <img id="fullscreenImage" alt="Instagram image">
  </div>
  <button id="closeFullscreen" class="close-fullscreen" aria-label="Close fullscreen">×</button>

  <script src="page.js"></script>
</body>
</html>
